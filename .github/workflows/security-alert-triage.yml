name: Syntavra Security Alert Triage

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  security-events: read

concurrency:
  group: syntavra-security-triage-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  export-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out analyzed source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Export CodeQL alerts 1 through 5
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          records = []
          for number in range(1, 6):
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}/code-scanning/alerts/{number}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "syntavra-security-triage",
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      alert = json.load(response)
              except urllib.error.HTTPError as error:
                  records.append({"number": number, "http_status": error.code, "available": False})
                  continue
              rule = alert.get("rule") or {}
              instance = alert.get("most_recent_instance") or {}
              location = instance.get("location") or {}
              records.append({
                  "number": alert.get("number", number),
                  "available": True,
                  "state": alert.get("state"),
                  "created_at": alert.get("created_at"),
                  "updated_at": alert.get("updated_at"),
                  "fixed_at": alert.get("fixed_at"),
                  "dismissed_at": alert.get("dismissed_at"),
                  "dismissed_reason": alert.get("dismissed_reason"),
                  "rule": {
                      "id": rule.get("id"),
                      "name": rule.get("name"),
                      "description": rule.get("description"),
                      "severity": rule.get("severity"),
                      "security_severity_level": rule.get("security_severity_level"),
                      "tags": rule.get("tags") or [],
                      "help_uri": rule.get("help_uri"),
                  },
                  "instance": {
                      "ref": instance.get("ref"),
                      "commit_sha": instance.get("commit_sha"),
                      "state": instance.get("state"),
                      "message": (instance.get("message") or {}).get("text"),
                      "classifications": instance.get("classifications") or [],
                      "location": {
                          "path": location.get("path"),
                          "start_line": location.get("start_line"),
                          "end_line": location.get("end_line"),
                          "start_column": location.get("start_column"),
                          "end_column": location.get("end_column"),
                      },
                  },
                  "instances_url": alert.get("instances_url"),
              })
          Path("code-scanning-alerts.json").write_text(
              json.dumps(records, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Apply exact alert remediation
        run: |
          python - <<'PY'
          from pathlib import Path

          provider = Path("syntavra_runtime/provider_proxy.py")
          source = provider.read_text(encoding="utf-8")

          def replace_once(old: str, new: str, label: str) -> None:
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one anchor, found {count}")
              source = source.replace(old, new, 1)

          replace_once("import os\nimport secrets\n", "import os\nimport re\nimport secrets\n", "import")
          replace_once(
              '_LOOPBACK_HOSTS = {"127.0.0.1", "::1", "localhost"}\n\n\n@dataclass(frozen=True)',
              '''_LOOPBACK_HOSTS = {"127.0.0.1", "::1", "localhost"}\n_HEADER_NAME_RE = re.compile(r"^[!#$%&\\'*+\\-.^_`|~0-9A-Za-z]+$")\n_MAX_HEADER_VALUE_BYTES = 8192\n\n\ndef _validated_header_name(value: str) -> str:\n    name = str(value)\n    if not name or not _HEADER_NAME_RE.fullmatch(name):\n        raise ValueError("invalid HTTP header name")\n    return name\n\n\ndef _validated_header_value(value: str) -> str:\n    text = str(value)\n    if any(character in text for character in ("\\r", "\\n", "\\x00")):\n        raise ValueError("HTTP header value contains a prohibited control character")\n    if any(ord(character) < 32 and character != "\\t" for character in text):\n        raise ValueError("HTTP header value contains a prohibited control character")\n    try:\n        encoded = text.encode("latin-1")\n    except UnicodeEncodeError as error:\n        raise ValueError("HTTP header value is not Latin-1 encodable") from error\n    if len(encoded) > _MAX_HEADER_VALUE_BYTES:\n        raise ValueError("HTTP header value exceeds the configured safety limit")\n    return text\n\n\ndef _validated_header(name: str, value: str) -> tuple[str, str]:\n    return _validated_header_name(name), _validated_header_value(value)\n\n\ndef _new_request_id() -> str:\n    return "sc-" + uuid.uuid4().hex\n\n\n@dataclass(frozen=True)''',
              "header helpers",
          )
          replace_once(
              '        if bool(self.tls_cert_file) != bool(self.tls_key_file):\n            raise ValueError("tls_cert_file and tls_key_file must be configured together")\n',
              '        if bool(self.tls_cert_file) != bool(self.tls_key_file):\n            raise ValueError("tls_cert_file and tls_key_file must be configured together")\n        if self.credential_header:\n            _validated_header_name(self.credential_header)\n        if self.credential_prefix:\n            _validated_header_value(self.credential_prefix)\n        _validated_header_value(self.default_anthropic_version)\n',
              "config validation",
          )
          replace_once(
              '''        return (\n            self.config.credential_header or default_header,\n            (self.config.credential_prefix if self.config.credential_prefix else default_prefix) + value,\n        )\n''',
              '''        header_name = self.config.credential_header or default_header\n        header_value = (self.config.credential_prefix if self.config.credential_prefix else default_prefix) + value\n        return _validated_header(header_name, header_value)\n''',
              "credential header",
          )
          replace_once(
              '''    def _headers(self, incoming: Mapping[str, str], body_length: int, request_id: str) -> dict[str, str]:\n        result: dict[str, str] = {}\n        for key, value in incoming.items():\n            name = key.casefold()\n            if name in _HOP_BY_HOP or name in _CREDENTIAL_HEADERS:\n                continue\n            if name in _FORWARD_HEADERS or name.startswith("x-syntavra-client-"):\n                result[key] = value\n        result["Content-Length"] = str(body_length)\n        result.setdefault("Content-Type", "application/json")\n        result["X-Request-ID"] = request_id\n        canonical = ProviderGateway.capabilities(self.config.provider)["provider"]\n        if canonical == "anthropic":\n            result.setdefault("anthropic-version", self.config.default_anthropic_version)\n        credential = self._credential()\n        if credential:\n            result[credential[0]] = credential[1]\n        return result\n''',
              '''    def _headers(self, incoming: Mapping[str, str], body_length: int, request_id: str) -> dict[str, str]:\n        result: dict[str, str] = {}\n        for key, value in incoming.items():\n            name = str(key).casefold()\n            if name in _HOP_BY_HOP or name in _CREDENTIAL_HEADERS:\n                continue\n            if name in _FORWARD_HEADERS or name.startswith("x-syntavra-client-"):\n                try:\n                    safe_key, safe_value = _validated_header(str(key), str(value))\n                except ValueError:\n                    continue\n                result[safe_key] = safe_value\n        result["Content-Length"] = str(max(0, int(body_length)))\n        result.setdefault("Content-Type", "application/json")\n        result["X-Request-ID"] = _validated_header_value(request_id)\n        canonical = ProviderGateway.capabilities(self.config.provider)["provider"]\n        if canonical == "anthropic":\n            result.setdefault("anthropic-version", _validated_header_value(self.config.default_anthropic_version))\n        credential = self._credential()\n        if credential:\n            result[credential[0]] = credential[1]\n        return result\n\n    @staticmethod\n    def _safe_response_headers(headers: Mapping[str, str]) -> dict[str, str]:\n        safe: dict[str, str] = {}\n        for key, value in headers.items():\n            try:\n                safe_key, safe_value = _validated_header(str(key), str(value))\n            except ValueError:\n                continue\n            safe[safe_key] = safe_value\n        return safe\n''',
              "request headers",
          )
          replace_once(
              '''                    key: value for key, value in response_headers.items()\n                    if key.casefold() not in _HOP_BY_HOP and key.casefold() not in _CREDENTIAL_HEADERS\n''',
              '''                    key: value\n                    for key, value in self._safe_response_headers(response_headers).items()\n                    if key.casefold() not in _HOP_BY_HOP and key.casefold() not in _CREDENTIAL_HEADERS\n''',
              "evidence response headers",
          )
          replace_once(
              '''            def _json(self, status: int, payload: Mapping[str, Any], headers: Mapping[str, str] | None = None) -> None:\n                body = canonical_json(dict(payload))\n                self.send_response(status)\n                self.send_header("Content-Type", "application/json")\n                self.send_header("Content-Length", str(len(body)))\n                self.send_header("Cache-Control", "no-store")\n                self.send_header("X-Content-Type-Options", "nosniff")\n                for key, value in (headers or {}).items():\n                    self.send_header(key, value)\n                self.end_headers()\n                self.wfile.write(body)\n''',
              '''            def _json(self, status: int, payload: Mapping[str, Any], *, request_id: str | None = None) -> None:\n                body = canonical_json(dict(payload))\n                self.send_response(status)\n                self.send_header("Content-Type", "application/json")\n                self.send_header("Content-Length", str(len(body)))\n                self.send_header("Cache-Control", "no-store")\n                self.send_header("X-Content-Type-Options", "nosniff")\n                if request_id is not None:\n                    self.send_header("X-Request-ID", _validated_header_value(request_id))\n                self.end_headers()\n                self.wfile.write(body)\n''',
              "json response headers",
          )
          source = source.replace(
              'request_id = self.headers.get("X-Request-ID") or "sc-" + uuid.uuid4().hex',
              'request_id = _new_request_id()',
          )
          if source.count('request_id = _new_request_id()') != 2:
              raise SystemExit("request-id anchors were not both replaced")
          replace_once(
              'self.send_header("X-Syntavra-Request-Handle", plan.request_handle)\n                        self.send_header("X-Request-ID", request_id)',
              'self.send_header("X-Syntavra-Request-Handle", _validated_header_value(plan.request_handle))\n                        self.send_header("X-Request-ID", _validated_header_value(request_id))',
              "replay headers",
          )
          replace_once(
              '''                for key, value in headers.items():\n                    name = key.casefold()\n                    if name in _HOP_BY_HOP or name in _CREDENTIAL_HEADERS or name == "content-length":\n                        continue\n                    self.send_header(key, value)\n                self.send_header("Content-Length", str(content_length))\n                self.send_header("X-Syntavra-Replay", "miss")\n                self.send_header("X-Syntavra-Request-Handle", plan.request_handle)\n                self.send_header("X-Syntavra-Capture", "complete-before-delivery" if streaming else "complete")\n                self.send_header("X-Syntavra-Evidence", evidence_handle)\n                self.send_header("X-Request-ID", request_id)\n''',
              '''                for key, value in runtime._safe_response_headers(headers).items():\n                    name = key.casefold()\n                    if name in _HOP_BY_HOP or name in _CREDENTIAL_HEADERS or name == "content-length":\n                        continue\n                    self.send_header(key, value)\n                self.send_header("Content-Length", str(max(0, int(content_length))))\n                self.send_header("X-Syntavra-Replay", "miss")\n                self.send_header("X-Syntavra-Request-Handle", _validated_header_value(plan.request_handle))\n                self.send_header("X-Syntavra-Capture", "complete-before-delivery" if streaming else "complete")\n                self.send_header("X-Syntavra-Evidence", _validated_header_value(evidence_handle))\n                self.send_header("X-Request-ID", _validated_header_value(request_id))\n''',
              "forward response headers",
          )
          replace_once(
              '''                        },\n                        {"X-Request-ID": request_id},\n                    )''',
              '''                        },\n                        request_id=request_id,\n                    )''',
              "blocked response request id",
          )
          source = source.replace(
              'self._json(HTTPStatus.BAD_REQUEST, {"error": type(exc).__name__, "detail": str(exc)})',
              'self._json(HTTPStatus.BAD_REQUEST, {"error": type(exc).__name__, "detail": "request validation failed"})',
          )
          source = source.replace(
              'self._json(HTTPStatus.BAD_GATEWAY, {"error": type(exc).__name__, "detail": str(exc)})',
              'self._json(HTTPStatus.BAD_GATEWAY, {"error": type(exc).__name__, "detail": "upstream request failed"})',
          )
          provider.write_text(source, encoding="utf-8")

          benchmark = Path("benchmarks/hardening_v3_benchmark.py")
          text = benchmark.read_text(encoding="utf-8")
          replacements = (
              (
                  '        scan = scan_text(injection)\n        pipeline = HostOutputPipeline(engine, sessions=sessions)\n',
                  '        scan = scan_text(injection)\n        secret_detection_pass = scan.secrets_found > 0\n        redaction_pass = "secret-value" not in scan.redacted_text\n        injection_detection_pass = bool(scan.injection_risk)\n        pipeline = HostOutputPipeline(engine, sessions=sessions)\n',
              ),
              (
                  'security_regressions=0 if scan.injection_risk and "secret-value" not in scan.redacted_text else 1,',
                  'security_regressions=0 if injection_detection_pass and secret_detection_pass and redaction_pass else 1,',
              ),
              (
                  '                "injection_risk": scan.injection_risk,\n                "secret_types": scan.secret_types,\n                "redaction_pass": "secret-value" not in scan.redacted_text,',
                  '                "injection_detection_pass": injection_detection_pass,\n                "secret_detection_pass": secret_detection_pass,\n                "redaction_pass": redaction_pass,',
              ),
              (
                  'and scan.injection_risk and not pipeline_result.get("blocked")',
                  'and injection_detection_pass and secret_detection_pass and redaction_pass and not pipeline_result.get("blocked")',
              ),
          )
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f"benchmark anchor count is {text.count(old)}")
              text = text.replace(old, new, 1)
          benchmark.write_text(text, encoding="utf-8")
          PY

      - name: Validate patched Python syntax
        run: python -m compileall -q syntavra_runtime/provider_proxy.py benchmarks/hardening_v3_benchmark.py

      - name: Commit exact security remediation
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          if git diff --quiet -- syntavra_runtime/provider_proxy.py benchmarks/hardening_v3_benchmark.py; then
            echo "No source changes required."
            exit 0
          fi
          git config user.name "syntavra-security-bot"
          git config user.email "syntavra-security-bot@users.noreply.github.com"
          git add syntavra_runtime/provider_proxy.py benchmarks/hardening_v3_benchmark.py
          git commit -m "close CodeQL alerts 1 4 and 5"
          git push origin "HEAD:${HEAD_BRANCH}"

      - name: Upload sanitized alert metadata and exact analyzed sources
        uses: actions/upload-artifact@v4
        with:
          name: syntavra-code-scanning-alerts
          path: |
            code-scanning-alerts.json
            syntavra_runtime/provider_proxy.py
            benchmarks/hardening_v3_benchmark.py
          if-no-files-found: error
          retention-days: 7
