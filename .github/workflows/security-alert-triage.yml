name: Syntavra Security Alert Triage

on:
  pull_request:
  workflow_run:
    workflows: [CodeQL]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  security-events: read

concurrency:
  group: syntavra-security-triage-${{ github.event.pull_request.number || github.event.workflow_run.id || github.ref }}
  cancel-in-progress: true

jobs:
  export-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out analyzed source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Export sanitized CodeQL alert metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "syntavra-security-triage",
          }

          def fetch_page(state: str, page: int) -> list[dict[str, object]]:
              query = urllib.parse.urlencode({"state": state, "per_page": 100, "page": page})
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}/code-scanning/alerts?{query}",
                  headers=headers,
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  value = json.load(response)
              if not isinstance(value, list):
                  raise TypeError("code-scanning alert list response must be an array")
              return value

          alerts: dict[int, dict[str, object]] = {}
          for state in ("open", "fixed", "dismissed"):
              for page in range(1, 101):
                  rows = fetch_page(state, page)
                  for alert in rows:
                      number = int(alert.get("number") or 0)
                      if number > 0:
                          alerts[number] = alert
                  if len(rows) < 100:
                      break
              else:
                  raise RuntimeError(f"code-scanning pagination exceeded safety bound for state={state}")

          records = []
          for number, alert in sorted(alerts.items()):
              rule = alert.get("rule") or {}
              instance = alert.get("most_recent_instance") or {}
              location = instance.get("location") or {}
              records.append({
                  "number": number,
                  "available": True,
                  "state": alert.get("state"),
                  "created_at": alert.get("created_at"),
                  "updated_at": alert.get("updated_at"),
                  "fixed_at": alert.get("fixed_at"),
                  "dismissed_at": alert.get("dismissed_at"),
                  "dismissed_reason": alert.get("dismissed_reason"),
                  "rule": {
                      "id": rule.get("id"),
                      "name": rule.get("name"),
                      "description": rule.get("description"),
                      "severity": rule.get("severity"),
                      "security_severity_level": rule.get("security_severity_level"),
                      "tags": rule.get("tags") or [],
                      "help_uri": rule.get("help_uri"),
                  },
                  "instance": {
                      "ref": instance.get("ref"),
                      "commit_sha": instance.get("commit_sha"),
                      "state": instance.get("state"),
                      "message": (instance.get("message") or {}).get("text"),
                      "classifications": instance.get("classifications") or [],
                      "location": {
                          "path": location.get("path"),
                          "start_line": location.get("start_line"),
                          "end_line": location.get("end_line"),
                          "start_column": location.get("start_column"),
                          "end_column": location.get("end_column"),
                      },
                  },
              })
          Path("code-scanning-alerts.json").write_text(
              json.dumps(records, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Enforce CodeQL alert 6 closure on main
        if: >-
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.conclusion == 'success'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CODEQL_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import time
          import urllib.request
          from pathlib import Path

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          expected_head = os.environ["CODEQL_HEAD_SHA"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "syntavra-security-closure",
          }
          url = f"https://api.github.com/repos/{repository}/code-scanning/alerts/6"

          alert = None
          for attempt in range(12):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  value = json.load(response)
              if not isinstance(value, dict):
                  raise TypeError("code-scanning alert response must be an object")
              alert = value
              if alert.get("state") == "fixed":
                  break
              if attempt < 11:
                  time.sleep(10)
          else:
              raise SystemExit(
                  f"CodeQL alert 6 remained {alert.get('state') if alert else 'unknown'} "
                  "after the default-branch analysis"
              )

          rule = alert.get("rule") or {}
          instance = alert.get("most_recent_instance") or {}
          location = instance.get("location") or {}
          if rule.get("id") != "py/redos":
              raise SystemExit(f"alert 6 rule changed unexpectedly: {rule.get('id')!r}")
          if location.get("path") != "syntavra_runtime/agent_config_auditor.py":
              raise SystemExit(f"alert 6 location changed unexpectedly: {location.get('path')!r}")

          receipt = {
              "alert_number": 6,
              "state": alert.get("state"),
              "rule_id": rule.get("id"),
              "fixed_at": alert.get("fixed_at"),
              "codeql_head_sha": expected_head,
              "most_recent_instance": {
                  "ref": instance.get("ref"),
                  "commit_sha": instance.get("commit_sha"),
                  "state": instance.get("state"),
                  "path": location.get("path"),
                  "start_line": location.get("start_line"),
                  "end_line": location.get("end_line"),
              },
              "claim": "CODEQL_ALERT_6_FIXED_ON_MAIN",
          }
          Path("code-scanning-alert-6-closure.json").write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload sanitized alert metadata
        uses: actions/upload-artifact@v4
        with:
          name: syntavra-code-scanning-alerts
          path: |
            code-scanning-alerts.json
            code-scanning-alert-6-closure.json
          if-no-files-found: error
          retention-days: 7
