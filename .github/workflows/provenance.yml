name: Attest Syntavra 0.0.1 Pre-Release

on:
  workflow_dispatch:
  push:
    tags: ["v0.0.1-*"]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Validate locked identity
        run: |
          python -m pip install --disable-pip-version-check -e .
          python -m syntavra_runtime version
          python -m syntavra_runtime run platform-manifest
      - name: Build Python distributions
        run: |
          python -m pip install --disable-pip-version-check build
          python -m build
      - name: Build installer package
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm test
          npm pack
      - name: Build TypeScript SDK package
        working-directory: sdk/typescript
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run check
          npm test
          npm pack
      - name: Generate checksums
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          paths=sorted([
              *Path('dist').glob('*'),
              *Path('.').glob('*.tgz'),
              *Path('sdk/typescript').glob('*.tgz'),
          ])
          rows=[{
              'path': path.as_posix(),
              'bytes': path.stat().st_size,
              'sha256': hashlib.sha256(path.read_bytes()).hexdigest(),
          } for path in paths if path.is_file()]
          Path('pre-release-provenance-checksums.json').write_text(
              json.dumps({'product': 'Syntavra', 'version': '0.0.1', 'channel': 'pre-release', 'artifacts': rows}, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
      - name: Attest Python distributions
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "dist/*"
      - name: Attest npm packages
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            *.tgz
            sdk/typescript/*.tgz
      - uses: actions/upload-artifact@v7
        with:
          name: syntavra-0.0.1-attested-pre-release
          path: |
            dist/*
            *.tgz
            sdk/typescript/*.tgz
            pre-release-provenance-checksums.json
          if-no-files-found: error
          retention-days: 90
