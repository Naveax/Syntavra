name: Bootstrap Syntavra consolidation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  audit-v4:
    if: github.actor == github.repository_owner && github.head_ref == 'agent/consolidate-remaining-systems'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Recover and audit the previous exact V4 transport
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: python tools/_bootstrap_v4_audit.py
