name: Finalize Syntavra consolidation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: syntavra-final-consolidation
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor == github.repository_owner && github.head_ref == 'agent/consolidate-remaining-systems'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      REPOSITORY: ${{ github.repository }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      EXPECTED_BASE: 0dad1718e228191abc0135aaaea8929c453f90c9
      EXPECTED_PRODUCT_TREE: dedb0abaa568e08410749486838d24cdad6c997b
      EXPECTED_TREE: a47c334afd85cf9c63c6ff1a466a0e083a9eab32
      EXPECTED_B64_SHA256: e12d386ff80f705456cff50b33a2ecb5a407c26bbe54bff3f74b61d7c7322ef6
      EXPECTED_PATCH_SHA256: f17ca899cd7ac2d1d2ba67e67c7c4f09276f19f66ebe57549e8f98f53662b266
      EXPECTED_LOCK_B64_SHA256: 9fbeae378f5d7624d467ba7f3dadb897e049e1bf1e415cb2727aa1fd2da8ba0f
      EXPECTED_LOCK_PATCH_SHA256: c9aa5de233b9072b57581c8c5cd0c86978703393467ac9912dc466b52780f75e
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout canonical main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify base and recover exact product
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_BASE}"
          : > /tmp/final.patch.gz.b64
          for index in 00 01 02 03; do
            url="https://raw.githubusercontent.com/${REPOSITORY}/${HEAD_SHA}/.syntavra-transport/final-${index}.b64"
            curl --fail --silent --show-error --location --header "Authorization: Bearer ${GH_TOKEN}" "${url}" >> /tmp/final.patch.gz.b64
          done
          test "$(sha256sum /tmp/final.patch.gz.b64 | cut -d' ' -f1)" = "${EXPECTED_B64_SHA256}"
          base64 --decode /tmp/final.patch.gz.b64 | gzip --decompress > /tmp/final.patch
          test "$(sha256sum /tmp/final.patch | cut -d' ' -f1)" = "${EXPECTED_PATCH_SHA256}"
          git config user.name "Naveax"
          git config user.email "79841922+Naveax@users.noreply.github.com"
          git am /tmp/final.patch
          test "$(git rev-parse HEAD^{tree})" = "${EXPECTED_PRODUCT_TREE}"

          url="https://raw.githubusercontent.com/${REPOSITORY}/${HEAD_SHA}/.syntavra-transport/final-lock.b64"
          curl --fail --silent --show-error --location --header "Authorization: Bearer ${GH_TOKEN}" "${url}" --output /tmp/final-lock.patch.gz.b64
          test "$(sha256sum /tmp/final-lock.patch.gz.b64 | cut -d' ' -f1)" = "${EXPECTED_LOCK_B64_SHA256}"
          base64 --decode /tmp/final-lock.patch.gz.b64 | gzip --decompress > /tmp/final-lock.patch
          test "$(sha256sum /tmp/final-lock.patch | cut -d' ' -f1)" = "${EXPECTED_LOCK_PATCH_SHA256}"
          git apply --index /tmp/final-lock.patch
          git commit --amend --no-edit
          test "$(git rev-parse HEAD^{tree})" = "${EXPECTED_TREE}"
          test -z "$(git status --porcelain)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip build cryptography pytest

      - name: Validate repository and runtime
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q syntavra_runtime tools tests
          python -m tools.validate
          python -m tools.validate_runtime
          python -m tools.validate_release
          python -m tools.check_repository_hygiene
          python -m tools.validate_competitive_gap_closure
          python -m tools.refresh_manifest --check
          git diff --check HEAD^

      - name: Run complete Python suite in deterministic shards
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/syntavra-test-logs
          find tests -name 'test_*.py' -type f | sort > /tmp/test-files
          split -n l/5 -d /tmp/test-files /tmp/test-shard-
          for shard in /tmp/test-shard-0{0,1,2,3,4}; do
            name="$(basename "${shard}")"
            log="/tmp/syntavra-test-logs/${name}.log"
            echo "Running ${name}: $(wc -l < "${shard}") files"
            set +e
            python -m pytest -q $(cat "${shard}") >"${log}" 2>&1
            rc=$?
            set -e
            cat "${log}"
            test "${rc}" -eq 0
          done

      - name: Upload Python test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: syntavra-python-shard-logs-${{ github.run_id }}
          path: /tmp/syntavra-test-logs/*.log
          if-no-files-found: error
          retention-days: 3

      - name: Validate npm installer
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          npm test
          npm run pack:check

      - name: Validate TypeScript SDK
        shell: bash
        run: |
          set -euo pipefail
          cd sdk/typescript
          npm ci --ignore-scripts
          npm run ci

      - name: Validate VS Code extension
        run: npm --prefix integrations/vscode-syntavra test

      - name: Validate native companion with lockfile
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/syntavra-native-logs
          set +e
          cargo test --manifest-path native/syntavra-native/Cargo.toml --locked > /tmp/syntavra-native-logs/cargo-test.log 2>&1
          rc=$?
          set -e
          cat /tmp/syntavra-native-logs/cargo-test.log
          test "${rc}" -eq 0
          test -z "$(git status --porcelain)"

      - name: Upload native test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: syntavra-native-log-${{ github.run_id }}
          path: /tmp/syntavra-native-logs/cargo-test.log
          if-no-files-found: warn
          retention-days: 3

      - name: Build and smoke-test wheel
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist build
          python -m build --wheel
          python -m venv /tmp/syntavra-smoke
          /tmp/syntavra-smoke/bin/pip install dist/syntavra_runtime-0.0.1-py3-none-any.whl
          /tmp/syntavra-smoke/bin/syntavra --help >/dev/null
          /tmp/syntavra-smoke/bin/syntavra --project "$PWD" run mode codex-ultra | tee /tmp/mode.json
          python - <<'PY'
          import json
          row=json.load(open('/tmp/mode.json', encoding='utf-8'))
          assert row['mode']=='ultra'
          assert row['profile']['context_budget_tokens']==1500
          PY
          rm -rf build
          test -z "$(git status --porcelain)"
          test "$(git rev-parse HEAD^{tree})" = "${EXPECTED_TREE}"

      - name: Publish validated main and remove non-main branches
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main
          gh api -X PATCH "repos/${REPOSITORY}/pulls/${PR_NUMBER}" -f state=closed >/dev/null || true
          gh api --paginate "repos/${REPOSITORY}/branches?per_page=100" --jq '.[].name' | while IFS= read -r branch; do
            if [ "${branch}" = "main" ]; then
              continue
            fi
            encoded="$(python -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "${branch}")"
            gh api -X DELETE "repos/${REPOSITORY}/git/refs/heads/${encoded}" || true
          done
          remaining="$(gh api --paginate "repos/${REPOSITORY}/branches?per_page=100" --jq '.[].name' | sort)"
          printf 'Remaining branches:\n%s\n' "${remaining}"
          test "${remaining}" = "main"
          test "$(git rev-parse HEAD^{tree})" = "${EXPECTED_TREE}"
