name: Continue SignalCore Hardening V3

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONWARNINGS: error::ResourceWarning
  OPENBLAS_NUM_THREADS: "1"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"

jobs:
  continue-hardening:
    if: github.head_ref == 'agent/adaptive-context-v04'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adaptive-context-v04
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Apply integration patches
        run: python tools/apply_hardening_v3.py
      - name: Host interception diagnostic gate
        run: |
          python - <<'PY'
          import json
          import tempfile
          from pathlib import Path
          from signalcore_runtime.evidence import EvidenceStore
          from signalcore_runtime.host_output_pipeline import HostOutputPipeline
          from signalcore_runtime.tool_externalization import ToolOutputExternalizer
          from signalcore_runtime.tool_externalization_types import ExternalizationPolicy
          class Session:
              def __init__(self): self.rows = {}
              def append(self, session_id, event_type, payload): self.rows.setdefault(session_id, []).append({'event_type': event_type, 'payload': payload})
          with tempfile.TemporaryDirectory() as temp:
              root = Path(temp)
              evidence = EvidenceStore(root / 'evidence', project_id='p')
              externalizer = ToolOutputExternalizer(root / 'external.sqlite3', evidence=evidence, policy=ExternalizationPolicy.for_profile('balanced'))
              sessions = Session()
              pipeline = HostOutputPipeline(externalizer, sessions=sessions)
              raw = ('INFO repeated request=1\n' * 2000) + 'FATAL auth refresh failure at src/auth.py:91\n'
              result = pipeline.capture_hook_payload({'tool': 'shell', 'command': 'service logs', 'result': {'stdout': raw}, 'session_id': 's'})
              diagnostic = {'result': result, 'sessions': sessions.rows}
              if result.get('captures'):
                  artifact_id = result['captures'][0]['artifact_id']
                  diagnostic['verify'] = externalizer.verify(artifact_id)
                  diagnostic['roundtrip'] = externalizer.restore(artifact_id) == raw.encode()
              Path('/tmp/host-debug.json').write_text(json.dumps(diagnostic, ensure_ascii=False, indent=2, sort_keys=True, default=str), encoding='utf-8')
              assert result['mode'] == 'externalized'
              assert result['captures']
              assert diagnostic['roundtrip'] is True
              assert diagnostic['verify']['ok'] is True
              assert sessions.rows['s'][-1]['event_type'] == 'host-output-externalized'
          PY
      - name: Upload host diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-v3-host-debug
          path: /tmp/host-debug.json
          if-no-files-found: error
      - name: Concurrent externalization gate
        run: |
          python - <<'PY'
          import json
          import tempfile
          import traceback
          from concurrent.futures import ThreadPoolExecutor
          from pathlib import Path
          from signalcore_runtime.evidence import EvidenceStore
          from signalcore_runtime.tool_externalization import ToolOutputExternalizer
          from signalcore_runtime.tool_externalization_types import ExternalizationPolicy, ToolPayload
          with tempfile.TemporaryDirectory() as temp:
              root = Path(temp)
              evidence = EvidenceStore(root / 'evidence', project_id='p')
              db_path = root / 'external.sqlite3'
              def capture(index):
                  try:
                      engine = ToolOutputExternalizer(db_path, evidence=evidence, policy=ExternalizationPolicy.for_profile('compact'))
                      text = (f'INFO worker={index} value=ok\n' * 1200) + f'ERROR needle-{index} at src/f{index}.py:9\n'
                      artifact = engine.externalize(ToolPayload(command='service logs', stdout=text, scope_key='stress', path=f'worker-{index}.log'))
                      return {'index': index, 'artifact_id': artifact.artifact_id, 'verify': engine.verify(artifact.artifact_id), 'search': bool(engine.search(f'needle-{index}', artifact_id=artifact.artifact_id))}
                  except Exception as exc:
                      return {'index': index, 'error_type': type(exc).__name__, 'error': str(exc), 'traceback': traceback.format_exc()}
              with ThreadPoolExecutor(max_workers=8) as pool:
                  rows = list(pool.map(capture, range(40)))
              errors = [row for row in rows if 'error' in row]
              final_stats = None
              try:
                  final_stats = ToolOutputExternalizer(db_path, evidence=evidence).stats()
              except Exception as exc:
                  errors.append({'index': 'final', 'error_type': type(exc).__name__, 'error': str(exc), 'traceback': traceback.format_exc()})
              diagnostic = {'rows': rows, 'errors': errors, 'final_stats': final_stats}
              Path('/tmp/concurrency-debug.json').write_text(json.dumps(diagnostic, ensure_ascii=False, indent=2, sort_keys=True, default=str), encoding='utf-8')
              assert not errors
              assert len({row['artifact_id'] for row in rows}) == 40
              assert all(row['verify']['ok'] for row in rows)
              assert all(row['search'] for row in rows)
              assert final_stats['artifacts'] == 40
          PY
      - name: Upload concurrency diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-v3-concurrency-debug
          path: /tmp/concurrency-debug.json
          if-no-files-found: error
      - name: Hardening unit suite
        run: python -m unittest discover -s tests/runtime -p 'test_signalcore_hardening_v3.py' -q
      - name: Legacy runtime suite
        run: python -m unittest discover -s tests/runtime -q
      - name: Platform gates
        run: python -m unittest tests.test_platforms tests.test_roblox_profile_gate -q
      - name: Roblox profile suite
        run: python -m unittest discover -s tests/roblox_profile -q
      - name: Hardening benchmark
        run: |
          mkdir -p benchmarks/results/hardening-v3
          python benchmarks/hardening_v3_benchmark.py --output benchmarks/results/hardening-v3/internal.json
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path('benchmarks/results/hardening-v3/internal.json').read_text())
          assert result['claim'] == 'SUPERIORITY_NOT_PROVEN'
          assert result['concurrency']['success_rate'] == 1.0
          assert result['concurrency']['all_roundtrips'] is True
          assert result['concurrency']['all_searches'] is True
          assert result['provider_receipt_ledger']['ok'] is True
          assert result['provider_receipt_ledger']['attestation'] == 'HMAC'
          assert result['semantic_temporal_retrieval']['ok'] is True
          assert result['security_scan']['injection_risk'] is True
          assert result['security_scan']['redaction_pass'] is True
          assert result['host_interception']['captures'] > 0
          assert result['readiness_gate']['ten_of_ten'] is False
          assert 'real-task-corpus' in result['readiness_gate']['failed']
          assert 'competitor-arms' in result['readiness_gate']['failed']
          PY
      - name: MCP hardening smoke
        run: |
          python - <<'PY'
          import tempfile
          from pathlib import Path
          from signalcore_runtime.mcp_server import MCPServer
          with tempfile.TemporaryDirectory() as temp:
              root = Path(temp)
              skill = root / 'skill'; skill.mkdir(); (skill / 'SKILL.md').write_text('name: signal-core\n')
              server = MCPServer(project=Path('.').resolve(), state_root=root / 'state', skill_root=skill, codex_home=root / '.codex', host='codex')
              names = {tool['name'] for tool in server.tools()}
              required = {'signalcore.output.capture','signalcore.output.search','signalcore.output.reveal','signalcore.output.verify','signalcore.usage.record','signalcore.usage.verify','signalcore.session.search','signalcore.session.semantic_context'}
              assert required <= names
              value = server.call_tool('signalcore.output.capture', {'stdout': 'INFO x\n' * 2000, 'command': 'service logs', 'scope_key': 'smoke'})
              assert server.call_tool('signalcore.output.verify', {'artifact_id': value['artifact_id']})['ok']
          PY
      - name: Remove one-shot integration files
        run: |
          rm .github/workflows/integrate-hardening-v3.yml
          rm .github/workflows/hardening-v3-continuation.yml
          rm tools/apply_hardening_v3.py
      - name: Regenerate release manifest
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path
          root = Path('.')
          generated = {'fusion-release-smoke.json','release-smoke.json','platform-registry.json','native-dry-run.json'}
          rows = []
          for path in root.rglob('*'):
              if not path.is_file(): continue
              relative = path.relative_to(root)
              if any(part in {'.git','.signalcore','__pycache__','.pytest_cache'} for part in relative.parts): continue
              if (path.name == 'MANIFEST.sha256' and path.parent == root) or path.name in generated or path.suffix == '.pyc': continue
              rows.append((relative.as_posix(), hashlib.sha256(path.read_bytes()).hexdigest()))
          root.joinpath('MANIFEST.sha256').write_text(''.join(f'{digest}  {name}\n' for name,digest in sorted(rows)), encoding='utf-8')
          PY
      - name: Release validators
        run: |
          python tools/validate.py
          python tools/validate_runtime.py
          python tools/validate_roblox_profile.py
          python tools/verify_claims.py
          python tools/validate_release.py --profile 5x --smoke --output release-smoke.json
      - name: Commit verified hardening
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Integrate SignalCore hardening v3'
          git push origin HEAD:agent/adaptive-context-v04
