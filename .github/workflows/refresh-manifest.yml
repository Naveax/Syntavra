name: Validate Syntavra Repository Manifest

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: syntavra-manifest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify repository hardening contract
        run: python tools/check_repository_hygiene.py
      - name: Verify deterministic SHA-256 manifest
        run: python tools/refresh_manifest.py --check
