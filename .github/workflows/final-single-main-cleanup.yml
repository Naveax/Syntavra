name: Final Syntavra single-main cleanup

on:
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: syntavra-final-single-main-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    if: github.actor == github.repository_owner && github.head_ref == 'agent/final-single-main-cleanup'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out canonical main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify canonical product identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = '58ee76f6c174786760962243509212cae918f87f'
          test "$(git rev-parse HEAD^{tree})" = '8f8d631d5ebc2bcf2beb4af3b99c3761bc28453b'
          python - <<'PY'
          from syntavra_runtime import __release_channel__, __version__
          assert __version__ == '0.0.1'
          assert __release_channel__ == 'pre-release'
          PY

      - name: Close all temporary pull requests
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t prs < <(gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100" --jq '.[].number')
          for pr in "${prs[@]}"; do
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/pulls/${pr}" -f state=closed >/dev/null
          done

      - name: Delete every branch except main
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t branches < <(git ls-remote --heads origin | awk '{sub("refs/heads/", "", $2); print $2}' | sort -u)
          for branch in "${branches[@]}"; do
            if [[ "$branch" != "main" ]]; then
              git push origin --delete "$branch"
            fi
          done

      - name: Verify single-branch repository
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            mapfile -t branches < <(git ls-remote --heads origin | awk '{sub("refs/heads/", "", $2); print $2}' | sort -u)
            if [[ "${#branches[@]}" -eq 1 && "${branches[0]}" == "main" ]]; then
              printf 'branch-count=1\nbranch=main\n'
              exit 0
            fi
            sleep 2
          done
          printf 'remaining branches:\n%s\n' "${branches[*]}" >&2
          exit 1

      - name: Publish final repository receipt
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          body=$(cat <<EOF
          ## Complete competitive feature set — final repository receipt

          - Canonical branch: \`main\` only
          - Canonical commit: \`58ee76f6c174786760962243509212cae918f87f\`
          - Canonical tree: \`8f8d631d5ebc2bcf2beb4af3b99c3761bc28453b\`
          - Version: \`0.0.1 / pre-release\`
          - Exact transport, patch and tree gates passed
          - Repository/runtime/release validators passed
          - Complete Python suite, npm installer, TypeScript SDK, VS Code package, Python distributions, and Rust native test/release build passed
          - Registry publication and provider-billed superiority remain external credential/evidence gates and are not fabricated

          Cleanup run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )
          gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/1/comments" -f body="$body" >/dev/null
