name: Prepare detached final manifest

on:
  pull_request:
    paths:
      - ".github/workflows/prepare-detached-manifest.yml"

permissions:
  contents: write

jobs:
  prepare:
    if: github.head_ref == 'agent/syntavra-identity-claim-cleanup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Generate final manifest and detached commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/prepare-detached-manifest.yml
          python -m tools.refresh_manifest
          python - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.error
          import urllib.request
          from pathlib import Path

          repo = os.environ["REPOSITORY"]
          token = os.environ["GH_TOKEN"]

          def post(path: str, payload: dict) -> dict:
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}{path}",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "syntavra-detached-manifest",
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(request) as response:
                      return json.load(response)
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  Path("prepared-error.txt").write_text(
                      f"HTTP {exc.code}\n{body}\n", encoding="utf-8"
                  )
                  raise

          manifest = Path("MANIFEST.sha256").read_bytes()
          blob = post(
              "/git/blobs",
              {
                  "content": base64.b64encode(manifest).decode("ascii"),
                  "encoding": "base64",
              },
          )
          parent = subprocess.check_output(
              ["git", "rev-parse", "HEAD"], text=True
          ).strip()
          base_tree = subprocess.check_output(
              ["git", "rev-parse", "HEAD^{tree}"], text=True
          ).strip()
          tree = post(
              "/git/trees",
              {
                  "base_tree": base_tree,
                  "tree": [
                      {
                          "path": "MANIFEST.sha256",
                          "mode": "100644",
                          "type": "blob",
                          "sha": blob["sha"],
                      }
                  ],
              },
          )
          commit = post(
              "/git/commits",
              {
                  "message": "Refresh manifest after Syntavra path cleanup",
                  "tree": tree["sha"],
                  "parents": [parent],
              },
          )
          Path("prepared-commit.txt").write_text(
              commit["sha"] + "\n", encoding="utf-8"
          )
          Path("prepared-tree.txt").write_text(
              tree["sha"] + "\n", encoding="utf-8"
          )
          PY
      - name: Upload prepared commit metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: syntavra-detached-final-manifest-v2
          path: |
            prepared-commit.txt
            prepared-tree.txt
            prepared-error.txt
            MANIFEST.sha256
          if-no-files-found: warn
          retention-days: 1
