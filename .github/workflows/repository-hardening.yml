name: Syntavra Repository Hardening

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  installer:
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install locked installer dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Test and inspect installer
        run: |
          npm test
          node install/index.mjs --help
          npm pack --dry-run --json > installer-pack.json
      - name: Verify installer identity
        run: |
          node -e "const p=require('./package.json'); if(p.name!=='@syntavra/install'||p.version!=='0.0.1') process.exit(1)"
          node -e "const p=require('./package-lock.json'); if(p.name!=='@syntavra/install'||p.version!=='0.0.1') process.exit(1)"

  typescript-sdk:
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Build and test SDK
        working-directory: sdk/typescript
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm run check
          npm test
          npm pack --dry-run --json > npm-pack-dry-run.json
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/receipts.js
          test -f dist/receipts.d.ts
          node -e "const p=require('./package.json'); if(p.name!=='@syntavra/sdk'||p.version!=='0.0.1') process.exit(1)"

  repository-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install runtime and policy dependencies
        run: python -m pip install --disable-pip-version-check -e . pytest
      - name: Repository hygiene and manifest
        run: |
          python tools/check_repository_hygiene.py
          python tools/refresh_manifest.py --check
      - name: Locked product identity and namespace
        run: |
          python - <<'PY'
          import json
          import tomllib
          from pathlib import Path
          import syntavra_runtime
          import signalcore_runtime
          project=tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']
          npm=json.loads(Path('package.json').read_text(encoding='utf-8'))
          sdk=json.loads(Path('sdk/typescript/package.json').read_text(encoding='utf-8'))
          release=json.loads(Path('release/pre-release.json').read_text(encoding='utf-8'))
          assert project['name'] == 'syntavra-runtime'
          assert project['version'] == '0.0.1'
          assert npm['name'] == '@syntavra/install' and npm['version'] == '0.0.1'
          assert sdk['name'] == '@syntavra/sdk' and sdk['version'] == '0.0.1'
          assert syntavra_runtime.__version__ == '0.0.1'
          assert signalcore_runtime.__version__ == '0.0.1'
          assert release['version'] == '0.0.1'
          assert release['channel'] == 'pre-release'
          PY
      - name: Security, recovery and claim-boundary tests
        run: |
          python -m pytest tests/runtime/test_syntavra_unified_platform.py -q
          python tools/verify_claims.py
