name: Diagnose Windows Syntavra identity

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-windows-identity.yml"

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/syntavra-identity-claim-cleanup'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install runtime and tests
        run: python -m pip install --disable-pip-version-check -e . pytest
      - name: Repository hygiene
        run: python -m tools.check_repository_hygiene
      - name: Package validation
        run: python -m tools.validate
      - name: Version smoke
        run: python -m syntavra_runtime version
      - name: Setup smoke
        run: python -m syntavra_runtime --project . setup --mcp-profile minimal
      - name: Platform smoke
        run: python -m syntavra_runtime --project . run platform-manifest
      - name: Proof smoke
        run: python -m syntavra_runtime --project . prove plan
      - name: Unified platform tests
        run: python -m pytest tests/runtime/test_syntavra_unified_platform.py -q
