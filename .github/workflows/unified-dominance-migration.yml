name: Apply Syntavra Unified Migration

on:
  push:
    branches:
      - agent/unified-dominance
    paths:
      - tools/apply_syntavra_unification.py
      - .github/workflows/unified-dominance-migration.yml
  pull_request:
    branches:
      - main
    paths:
      - tools/apply_syntavra_unification.py
      - .github/workflows/unified-dominance-migration.yml

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]' && (github.event_name != 'pull_request' || github.head_ref == 'agent/unified-dominance')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply unified product migration
        id: migration
        shell: bash
        run: |
          set +e
          PYTHONFAULTHANDLER=1 python tools/apply_syntavra_unification.py > migration.log 2>&1
          status=$?
          cat migration.log
          exit "$status"
      - name: Upload migration diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: syntavra-migration-diagnostics
          path: migration.log
          if-no-files-found: error
          retention-days: 7
      - name: Refresh npm lockfiles
        shell: bash
        run: |
          npm install --package-lock-only --ignore-scripts
          npm --prefix sdk/typescript install --package-lock-only --ignore-scripts
      - name: Install migrated Python package
        run: python -m pip install --disable-pip-version-check -e .
      - name: Compile canonical and compatibility namespaces
        run: python -m compileall -q syntavra_runtime signalcore_runtime
      - name: Verify canonical imports
        run: |
          python - <<'PY'
          import syntavra_runtime
          import signalcore_runtime
          from syntavra_runtime.platform import SyntavraPlatform
          assert syntavra_runtime.__version__ == '0.0.1'
          assert signalcore_runtime.__version__ == '0.0.1'
          assert SyntavraPlatform.__name__ == 'SyntavraPlatform'
          PY
      - name: Installer tests
        run: npm test
      - name: Restore protected workflow tree
        run: git restore --source=HEAD -- .github/workflows
      - name: Refresh repository manifest
        run: python tools/refresh_manifest.py
      - name: Commit migrated repository
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo 'No migration changes.'
            exit 0
          fi
          git commit -m 'establish Syntavra unified product identity'
          git push origin HEAD:"$TARGET_BRANCH"
