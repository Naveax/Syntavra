name: Audit Syntavra V4 transport

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  audit:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.number == 62
    runs-on: ubuntu-latest
    steps:
      - name: Audit comment transport
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: '62'
        run: |
          python - <<'PY'
          import hashlib, json, os, re, urllib.request
          expected = {
            0:'2466b0a6ae0f65b266c981b788978d759627f1038e6336d7e5e10eff0920c5c7',
            1:'99fb16797035f4b26c246447fc21d600faf201f62d3a5f3e9c2be13bf35b6376',
            2:'d75cd8dd3415e73fc37055f30414a19aa8a134a8474b0b655cdb61eee32c8d90',
            3:'726cf2cc57eb8e90f14f5ce7f38d15320ec62a4199c2d66945b7e382891392c9',
            4:'1e0d08102f638e2c52302382b0e44366f23a605d8c3fc73e281efc7b910ecbd0',
            5:'fa195be77bf482f3673e6b91fc1e6533e9a14e57253aa78c1922a46273a77c3e',
            6:'7a7b8c4e26c18e23631d606c2c7400d751e731684e8e8809824328a78d0ee1fc',
            7:'e703ff289f62215b035f21379dc1749d1faba4a58149db6c0a935c9639bed9bd',
            8:'601f79a0a4e44831ee3794f21514801779878845576fe1398a2da295780232d7',
            9:'4f2f677d9ca7b75c1094b831ee57e6ab4eb3a3a268a5c3bce7ee3e9b4da54de3',
            10:'8fdb6f15161e33b169ea160145b7b28d183ee45fb5805fc90324af9b7db750ad',
            11:'edf98a9ba867ac0875281516589d60b3e61a68f228be05f7558305a454107ce0',
            12:'913e5a684246920d3ca6b4ec57eca6c3f20db2f19662f27ea483a1a8b2284c35',
            13:'9a247c4a95efe0eb9ba8bda5d146d272e9a3f808d5e2f56954f75a397d4932b0',
            14:'e5ab0a6fd44d1cc9b4e16e598f427db865cfffdf4fddd512beeced257f9a5c77',
            15:'3cf7f411890f311c6e72508f87208cc16a43ccbba64cbef3134df80784da222d',
            16:'f49fa911c1b063c237103d93045232e4b97e2b09ce89f9dc4e2f5b32868e2905',
          }
          headers={'Authorization':f'Bearer {os.environ["GH_TOKEN"]}','Accept':'application/vnd.github+json','User-Agent':'syntavra-transport-audit'}
          comments=[]
          page=1
          while True:
            url=f'https://api.github.com/repos/{os.environ["REPOSITORY"]}/issues/{os.environ["PR_NUMBER"]}/comments?per_page=100&page={page}'
            with urllib.request.urlopen(urllib.request.Request(url,headers=headers),timeout=30) as r: rows=json.load(r)
            comments.extend(rows)
            if len(rows)<100: break
            page+=1
          found={}; bad=[]
          pattern=re.compile(r'^<!-- SYNTAVRA_V4_PART index=(\d+) sha256=([0-9a-f]{64}) -->\n(.*)\n<!-- SYNTAVRA_V4_END -->$',re.S)
          for row in comments:
            m=pattern.match(row.get('body') or '')
            if not m: continue
            i=int(m.group(1)); declared=m.group(2); text=m.group(3); actual=hashlib.sha256(text.encode()).hexdigest()
            if i in expected and declared==expected[i] and actual==expected[i]: found[i]=text
            else: bad.append({'id':row.get('id'),'index':i,'declared':declared,'actual':actual})
          missing=sorted(set(expected)-set(found))
          result={'found':sorted(found),'missing':missing,'bad':bad,'comment_count':len(comments)}
          print(json.dumps(result,indent=2))
          open('transport-audit.json','w').write(json.dumps(result,indent=2)+'\n')
          if missing: raise SystemExit(f'missing V4 chunks: {missing}')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: syntavra-v4-transport-audit
          path: transport-audit.json
          if-no-files-found: error
