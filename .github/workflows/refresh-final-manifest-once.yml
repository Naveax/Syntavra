name: Refresh final manifest once

on:
  push:
    branches:
      - agent/adaptive-context-v04
    paths:
      - .github/workflows/refresh-final-manifest-once.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adaptive-context-v04
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Regenerate manifest and validate
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/refresh-final-manifest-once.yml
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import subprocess

          paths = subprocess.check_output(["git", "ls-files", "-z"]).split(b"\0")
          rows = []
          for raw in paths:
              if not raw:
                  continue
              path = raw.decode("utf-8")
              if path == "MANIFEST.sha256":
                  continue
              target = Path(path)
              if not target.is_file():
                  continue
              rows.append((path, hashlib.sha256(target.read_bytes()).hexdigest()))
          rows.sort(key=lambda item: item[0])
          Path("MANIFEST.sha256").write_text(
              "".join(f"{digest}  {path}\n" for path, digest in rows),
              encoding="utf-8",
              newline="\n",
          )
          PY
          python tools/validate.py
          python -m unittest discover -s tests/runtime -p 'test_*.py'
      - name: Commit clean final tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refresh final manifest and remove one-shot workflow"
          git push origin HEAD:agent/adaptive-context-v04
