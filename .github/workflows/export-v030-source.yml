name: Temporary SignalCore v0.3 source export

on:
  push:
    branches: [agent/signalcore-v0.3.0-unified]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Export tracked source
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output=signalcore-v030-source.tar.gz HEAD
          sha256sum signalcore-v030-source.tar.gz > signalcore-v030-source.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: signalcore-v030-source
          path: |
            signalcore-v030-source.tar.gz
            signalcore-v030-source.tar.gz.sha256
          if-no-files-found: error
          retention-days: 1
