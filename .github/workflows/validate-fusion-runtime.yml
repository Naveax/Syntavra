name: Validate Syntavra 0.0.1 Pre-Release

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: syntavra-pre-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONWARNINGS: "error::ResourceWarning"
  OPENBLAS_NUM_THREADS: "1"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"

jobs:
  runtime-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install runtime and test dependencies
        run: python -m pip install --disable-pip-version-check -e . pytest
      - name: Compile canonical source and compatibility boundary
        run: python -m compileall -q syntavra_runtime signalcore_runtime skills/syntavra tools tests benchmarks
      - name: Runtime and unified-platform tests
        id: runtime-tests
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p .syntavra/ci
          python -m pytest tests/runtime -q > .syntavra/ci/runtime-tests.log 2>&1
      - name: Upload runtime diagnostics
        if: steps.runtime-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: syntavra-runtime-tests-${{ matrix.os }}-py${{ matrix.python }}
          path: .syntavra/ci/runtime-tests.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce runtime test success
        if: steps.runtime-tests.outcome == 'failure'
        shell: bash
        run: |
          cat .syntavra/ci/runtime-tests.log
          exit 1
      - name: Existing profile compatibility tests
        run: python -m pytest tests/test_platforms.py tests/test_roblox_profile_gate.py -q
      - name: Runtime package validation
        run: python -m tools.validate_runtime
      - name: Package integrity validation
        run: python -m tools.validate
      - name: Fail-closed release smoke
        run: python -m tools.validate_release --profile 5x --smoke --output release-smoke.json
      - name: Canonical four-command workflow smoke
        shell: bash
        run: |
          python -m syntavra_runtime --project . version > version.json
          python -m syntavra_runtime --project . setup --apply --mcp-profile minimal > setup.json
          python -m syntavra_runtime --project . status > status.json
          python -m syntavra_runtime --project . run platform-manifest > platform.json
          python -m syntavra_runtime --project . run route repo.search > route.json
          python -m syntavra_runtime --project . run gateway-plan openai > gateway.json
          python -m syntavra_runtime --project . run semantic-services > semantic.json
          python -m syntavra_runtime --project . run sandbox-status > sandbox.json
          python -m syntavra_runtime --project . run reliability-run --cases 50 --seed 17 > reliability.json
          python -m syntavra_runtime --project . prove plan > proof-plan.json
          python -m syntavra_runtime --project . prove readiness > readiness.json || test $? -eq 4
          python - <<'PY'
          import json
          from pathlib import Path
          import syntavra_runtime
          import signalcore_runtime
          load=lambda name: json.loads(Path(name).read_text(encoding='utf-8'))
          version=load('version.json')
          setup=load('setup.json')
          status=load('status.json')
          platform=load('platform.json')
          route=load('route.json')
          gateway=load('gateway.json')
          semantic=load('semantic.json')
          sandbox=load('sandbox.json')
          reliability=load('reliability.json')
          proof=load('proof-plan.json')
          readiness=load('readiness.json')
          assert syntavra_runtime.__version__ == '0.0.1'
          assert signalcore_runtime.__version__ == '0.0.1'
          assert version['identity']['version'] == '0.0.1'
          assert version['identity']['channel'] == 'pre-release'
          assert setup['ok'] is True and setup['dry_run'] is False
          assert status['primary_workflow'] == ['setup', 'status', 'run', 'prove']
          assert status['platform']['product'] == 'Syntavra'
          assert platform['product'] == 'Syntavra'
          assert platform['version'] == '0.0.1'
          assert platform['channel'] == 'pre-release'
          assert route['allowed'] is True and route['category'] == 'read'
          assert gateway['ok'] is True
          assert semantic['declared'] >= 16
          assert sandbox['fail_closed'] is True
          assert reliability['ok'] is True
          assert proof['claim'] == 'EXTERNAL_SUPERIORITY_NOT_PROVEN'
          assert readiness['claim'] == 'DAILY_CODING_AGENT_READINESS_NOT_PROVEN'
          PY

  typescript-sdk:
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install, type-check, build and test
        shell: bash
        run: |
          cd sdk/typescript
          npm ci --ignore-scripts --no-audit --no-fund
          npm run check
          npm test
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/receipts.js
          test -f dist/receipts.d.ts
      - name: Verify package contents
        shell: bash
        run: |
          cd sdk/typescript
          npm pack --dry-run --json > npm-pack-dry-run.json
          python - <<'PY'
          import json
          from pathlib import Path
          value=json.loads(Path('npm-pack-dry-run.json').read_text())[0]
          files={row['path'] for row in value['files']}
          required={'dist/index.js','dist/index.d.ts','dist/receipts.js','dist/receipts.d.ts','package.json'}
          assert required <= files, sorted(required-files)
          assert value['version'] == '0.0.1'
          PY

  wheel-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build wheel
        run: |
          python -m pip install --disable-pip-version-check 'setuptools>=69' wheel
          python -m pip wheel --no-build-isolation . -w dist
      - name: Install wheel into clean environment
        shell: bash
        run: |
          python -m venv /tmp/syntavra-wheel
          /tmp/syntavra-wheel/bin/python -m pip install --no-index --find-links dist syntavra-runtime==0.0.1
          cd /tmp
          /tmp/syntavra-wheel/bin/syntavra version > version.json
          /tmp/syntavra-wheel/bin/syntavra run platform-manifest > platform.json
          /tmp/syntavra-wheel/bin/python - <<'PY'
          import json
          from pathlib import Path
          import syntavra_runtime
          import signalcore_runtime
          from syntavra_runtime import ProductSurface, ProviderUsageReceipt, SessionContinuityController
          from syntavra_runtime.cli import skill_root
          assert (skill_root() / 'SKILL.md').is_file()
          assert syntavra_runtime.__version__ == '0.0.1'
          assert signalcore_runtime.__version__ == '0.0.1'
          assert json.loads(Path('version.json').read_text())['identity']['version'] == '0.0.1'
          assert json.loads(Path('platform.json').read_text())['product'] == 'Syntavra'
          assert ProductSurface.manifest()['channel'] == 'pre-release'
          assert ProviderUsageReceipt
          assert SessionContinuityController
          PY

  internal-component-measurement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install runtime
        run: python -m pip install --disable-pip-version-check -e .
      - name: Run canonical component measurement
        run: python benchmarks/syntavra_component_benchmark.py > syntavra-component-measurement.json
      - name: Validate internal-only claim boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          value=json.loads(Path('syntavra-component-measurement.json').read_text())
          assert value['version'] == '0.0.1'
          assert value['channel'] == 'pre-release'
          assert value['claim'] == 'INTERNAL_FUNCTIONAL_MEASUREMENT_ONLY'
          assert value['external_superiority'] is False
          assert value['memory']['exact_recovery'] is True
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: syntavra-internal-component-measurement
          path: syntavra-component-measurement.json
          retention-days: 14

  profile-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -e . pytest
      - name: Roblox profile tests and validation
        run: |
          python -m pytest tests/roblox_profile -q
          python tools/validate_roblox_profile.py
          python tools/verify_claims.py
