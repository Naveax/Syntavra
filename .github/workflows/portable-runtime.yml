name: Build Syntavra Portable Runtime

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "syntavra_runtime/**"
      - "signalcore_runtime/**"
      - "tools/portable_entry.py"
      - "install/**"
      - ".github/workflows/portable-runtime.yml"
  push:
    tags:
      - "v0.0.1-pre-release*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: syntavra-portable-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target_arch: ""
            extension: ""
          - os: windows-latest
            platform: win32
            arch: x64
            target_arch: ""
            extension: ".exe"
          - os: macos-15-intel
            platform: darwin
            arch: x64
            target_arch: x86_64
            extension: ""
          - os: macos-14
            platform: darwin
            arch: arm64
            target_arch: arm64
            extension: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: python -m pip install --disable-pip-version-check . pyinstaller
      - name: Build self-contained runtime
        shell: bash
        run: |
          args=(--onefile --clean --name syntavra --collect-data syntavra_runtime --collect-data signalcore_runtime)
          if [[ "${{ matrix.platform }}" == "darwin" ]]; then
            args+=(--target-arch "${{ matrix.target_arch }}")
          fi
          python -m PyInstaller "${args[@]}" tools/portable_entry.py
          asset="syntavra-0.0.1-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.extension }}"
          mv "dist/syntavra${{ matrix.extension }}" "$asset"
          if [[ "${{ matrix.platform }}" == "darwin" ]]; then
            codesign --force --deep --sign - "$asset"
            codesign --verify --deep --strict --verbose=2 "$asset"
          fi
          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path
          asset=Path(f"syntavra-0.0.1-{os.environ['SYNTAVRA_PLATFORM']}-{os.environ['SYNTAVRA_ARCH']}{os.environ['SYNTAVRA_EXTENSION']}")
          digest=hashlib.sha256(asset.read_bytes()).hexdigest()
          asset.with_name(asset.name + '.sha256').write_text(f"{digest}  {asset.name}\n", encoding='utf-8')
          PY
        env:
          SYNTAVRA_PLATFORM: ${{ matrix.platform }}
          SYNTAVRA_ARCH: ${{ matrix.arch }}
          SYNTAVRA_EXTENSION: ${{ matrix.extension }}
      - name: Verify locked identity and canonical product surface
        shell: bash
        run: |
          asset="syntavra-0.0.1-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.extension }}"
          set +e
          "$PWD/$asset" version > portable-version.json 2> portable-version.stderr
          version_status=$?
          "$PWD/$asset" --project . run platform-manifest > portable-platform.json 2>> portable-version.stderr
          platform_status=$?
          set -e
          cat portable-version.stderr || true
          if [[ $version_status -ne 0 || $platform_status -ne 0 ]]; then
            file "$asset" || true
            if [[ "${{ matrix.platform }}" == "darwin" ]]; then
              codesign --display --verbose=4 "$asset" || true
              codesign --verify --deep --strict --verbose=4 "$asset" || true
            fi
            exit 1
          fi
          python - <<'PY'
          import json
          version=json.load(open('portable-version.json', encoding='utf-8'))
          platform=json.load(open('portable-platform.json', encoding='utf-8'))
          identity=version['identity']
          assert identity['version'] == '0.0.1', identity
          assert identity['channel'] == 'pre-release', identity
          assert platform['product'] == 'Syntavra', platform
          assert platform['version'] == '0.0.1', platform
          assert platform['channel'] == 'pre-release', platform
          PY
      - name: Upload portable diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: syntavra-portable-diagnostics-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            syntavra-0.0.1-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.extension }}
            syntavra-0.0.1-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.extension }}.sha256
            portable-version.json
            portable-platform.json
            portable-version.stderr
          if-no-files-found: warn
          retention-days: 7
      - name: Attest portable runtime
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            syntavra-0.0.1-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.extension }}
            syntavra-0.0.1-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.extension }}.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: syntavra-portable-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            syntavra-0.0.1-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.extension }}
            syntavra-0.0.1-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.extension }}.sha256
            portable-version.json
            portable-platform.json
          if-no-files-found: error
          retention-days: 90

  release:
    if: startsWith(github.ref, 'refs/tags/v0.0.1-pre-release')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: syntavra-portable-*
          path: release-assets
          merge-multiple: true
      - name: Create or update pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --prerelease --title "Syntavra 0.0.1 pre-release" --notes "Portable runtime artifacts for the locked Syntavra 0.0.1 pre-release line."
          fi
          gh release upload "$TAG" release-assets/syntavra-0.0.1-* --clobber
