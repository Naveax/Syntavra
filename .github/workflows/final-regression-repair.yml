name: Syntavra Final Regression Repair

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: syntavra-final-regression-repair-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Make Python same-module resolution evidence-aware
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("syntavra_runtime/semantic_intelligence.py")
          source = path.read_text(encoding="utf-8")

          old = '''        symbols: dict[str, str] = {}
        for node in ast.walk(tree):
'''
          new = '''        symbols: dict[str, str] = {}
        top_level_counts: dict[str, int] = {}
        for candidate in tree.body:
            if isinstance(candidate, (ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef)):
                top_level_counts[candidate.name] = top_level_counts.get(candidate.name, 0) + 1
        top_level_symbols: dict[str, str] = {}

        def scope_binds_name(scope: ast.AST, name: str) -> bool:
            if scope is tree:
                return False
            for item in ast.walk(scope):
                if item is scope:
                    continue
                if isinstance(item, ast.arg) and item.arg == name:
                    return True
                if isinstance(item, ast.Name) and item.id == name and isinstance(item.ctx, (ast.Store, ast.Del)):
                    return True
                if isinstance(item, (ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef)) and item.name == name:
                    return True
                if isinstance(item, ast.alias):
                    bound = item.asname or item.name.split(".", 1)[0]
                    if bound == name:
                        return True
                if isinstance(item, ast.Nonlocal) and name in item.names:
                    return True
            return False

        for node in ast.walk(tree):
'''
          if source.count(old) != 1:
              raise SystemExit(f"symbol anchor count={source.count(old)}")
          source = source.replace(old, new, 1)

          old = '''                symbols[node.name] = node_id
                nodes.append({
'''
          new = '''                symbols[node.name] = node_id
                if node in tree.body and top_level_counts.get(node.name) == 1:
                    top_level_symbols[node.name] = node_id
                nodes.append({
'''
          if source.count(old) != 1:
              raise SystemExit(f"top-level anchor count={source.count(old)}")
          source = source.replace(old, new, 1)

          old = '''                    if name in symbols:
                        edges.append({
                            "source": parent_id,
                            "target": symbols[name],
                            "edge_type": "calls",
                            "confidence": 0.92,
                            "evidence_ref": evidence,
                            "metadata_json": self._metadata(source="python-ast", exact_semantic=False, resolution="same-file-name"),
                        })
'''
          new = '''                    target_id = top_level_symbols.get(name)
                    if target_id is not None:
                        exact_resolution = not scope_binds_name(parent, name)
                        edges.append({
                            "source": parent_id,
                            "target": target_id,
                            "edge_type": "calls",
                            "confidence": 1.0 if exact_resolution else 0.72,
                            "evidence_ref": evidence,
                            "metadata_json": self._metadata(
                                source="python-ast",
                                exact_semantic=exact_resolution,
                                resolution="unique-top-level-scope" if exact_resolution else "same-file-name-shadow-risk",
                            ),
                        })
'''
          if source.count(old) != 1:
              raise SystemExit(f"call anchor count={source.count(old)}")
          source = source.replace(old, new, 1)
          path.write_text(source, encoding="utf-8")
          PY

      - name: Validate focused regressions
        run: |
          python -m compileall -q syntavra_runtime/platform.py syntavra_runtime/semantic_intelligence.py
          python -m pip install --disable-pip-version-check -e . pytest
          python -m pytest -q \
            tests/runtime/test_platform_components.py::SyntavraPlatformTests::test_incremental_graph_python_query_and_impact \
            tests/runtime/test_syntavra_unified_platform.py::test_semantic_graph_runtime_evidence_and_incremental_index \
            tests/runtime/test_semantic_services_compat.py \
            tests/runtime/test_language_cli.py

      - name: Commit focused repair
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          if git diff --quiet -- syntavra_runtime/semantic_intelligence.py; then
            echo "No semantic intelligence changes required."
            exit 0
          fi
          git config user.name "syntavra-regression-bot"
          git config user.email "syntavra-regression-bot@users.noreply.github.com"
          git add syntavra_runtime/semantic_intelligence.py
          git commit -m "repair universal language compatibility regressions"
          git push origin "HEAD:${HEAD_BRANCH}"
