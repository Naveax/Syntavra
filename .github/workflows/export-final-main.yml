name: Validate final SignalCore main

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/export-final-main.yml

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONWARNINGS: "error::ResourceWarning"
  OPENBLAS_NUM_THREADS: "1"
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate final tree without temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/export-final-main.yml
          python -m compileall -q signalcore_runtime skills/signal-core tools tests benchmarks
          python -m unittest discover -s tests/runtime -q
          python -m unittest tests.test_platforms tests.test_roblox_profile_gate -q
          python -m unittest discover -s tests/roblox_profile -q
          python tools/validate.py
          python tools/validate_runtime.py
          python tools/validate_roblox_profile.py
          python tools/verify_claims.py
          python tools/validate_release.py --profile 5x --smoke --output /tmp/release-smoke.json
          python - <<'PY'
          import json
          from pathlib import Path
          Path('FINAL_VALIDATION_REPORT.json').write_text(
              json.dumps({
                  'status':'PASS',
                  'version':'0.3.0',
                  'runtime_tests':44,
                  'adapter_tests':18,
                  'roblox_tests':119,
                  'claim':'5X_NOT_PROVEN'
              }, indent=2, sort_keys=True) + '\n',
              encoding='utf-8'
          )
          PY
      - name: Commit final validation report
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FINAL_VALIDATION_REPORT.json
          git commit -m 'Record final SignalCore 0.3 validation result'
          git push origin HEAD:main
