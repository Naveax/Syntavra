name: Temporary Windows validator diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Capture validator output
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          python tools/validate.py *>&1 | Tee-Object -FilePath validation-output.txt
          "exit_code=$LASTEXITCODE" | Add-Content validation-output.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: windows-validator-diagnostic
          path: validation-output.txt
          if-no-files-found: error
          retention-days: 1
