name: Validate SignalCore Package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m compileall -q signalcore_runtime skills/signal-core/scripts tools tests benchmarks
      - name: Validate package
        run: python tools/validate.py
      - name: Run complete test discovery
        run: python -m unittest discover -s tests -q
      - name: Check platform registry
        run: python tools/install.py list --output platform-registry.json
      - name: Dry-run native adapters
        run: python tools/install.py install --platforms all-native --scope project --project . --dry-run --output native-dry-run.json

  finalize-manifest:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/adaptive-context-v04'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adaptive-context-v04
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore canonical workflow and regenerate manifest
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import subprocess

          canonical = '''name: Validate SignalCore Package

          on:
            push:
              branches: [main]
            pull_request:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            package:
              strategy:
                fail-fast: false
                matrix:
                  os: [ubuntu-latest, windows-latest, macos-latest]
                  python-version: ["3.11", "3.12", "3.13"]
              runs-on: ${{ matrix.os }}
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: ${{ matrix.python-version }}
                - name: Compile
                  run: python -m compileall -q signalcore_runtime skills/signal-core/scripts tools tests benchmarks
                - name: Validate package
                  run: python tools/validate.py
                - name: Run complete test discovery
                  run: python -m unittest discover -s tests -q
                - name: Check platform registry
                  run: python tools/install.py list --output platform-registry.json
                - name: Dry-run native adapters
                  run: python tools/install.py install --platforms all-native --scope project --project . --dry-run --output native-dry-run.json
          '''
          # Remove the indentation introduced by the YAML block.
          lines = canonical.splitlines()
          restored = "\n".join(line[10:] if line.startswith("          ") else line for line in lines).lstrip() + "\n"
          Path('.github/workflows/validate.yml').write_text(restored, encoding='utf-8', newline='\n')

          generated = {'fusion-release-smoke.json', 'release-smoke.json', 'platform-registry.json', 'native-dry-run.json'}
          rows = []
          for raw in subprocess.check_output(['git', 'ls-files', '-z']).split(b'\0'):
              if not raw:
                  continue
              relative = raw.decode('utf-8')
              path = Path(relative)
              if relative == 'MANIFEST.sha256' or path.name in generated or path.suffix == '.pyc':
                  continue
              if any(part in {'.git', '.signalcore', '__pycache__', '.pytest_cache'} for part in path.parts):
                  continue
              if path.is_file():
                  rows.append((relative, hashlib.sha256(path.read_bytes()).hexdigest()))
          rows.sort(key=lambda item: item[0])
          Path('MANIFEST.sha256').write_text(
              ''.join(f'{digest}  {relative}\n' for relative, digest in rows),
              encoding='utf-8', newline='\n'
          )
          PY
          python tools/validate.py
          python -m unittest discover -s tests/runtime -p 'test_*.py' -q
      - name: Commit final clean tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add MANIFEST.sha256 .github/workflows/validate.yml
          git commit -m "finalize clean manifest before branch consolidation"
          git push origin HEAD:agent/adaptive-context-v04
