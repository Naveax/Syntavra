name: Validate Syntavra Package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: syntavra-package-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install runtime and test dependencies
        run: python -m pip install --disable-pip-version-check -e . pytest
      - name: Compile canonical and compatibility packages
        run: python -m compileall -q syntavra_runtime signalcore_runtime skills/syntavra/scripts tools tests benchmarks
      - name: Validate package and locked identity
        run: |
          python -m tools.validate
          python -m syntavra_runtime version
          python -m syntavra_runtime run platform-manifest
      - name: Run complete test suite
        id: package-tests
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p .syntavra/ci
          python -m pytest tests -q > .syntavra/ci/package-tests.log 2>&1
      - name: Upload package test diagnostics
        if: steps.package-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: syntavra-package-tests-${{ matrix.os }}-py${{ matrix.python-version }}
          path: .syntavra/ci/package-tests.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce package test success
        if: steps.package-tests.outcome == 'failure'
        shell: bash
        run: |
          cat .syntavra/ci/package-tests.log
          exit 1
      - name: Check platform registry
        run: python tools/install.py list --output platform-registry.json
      - name: Dry-run native adapters
        run: python tools/install.py install --platforms all-native --scope project --project . --dry-run --output native-dry-run.json
