name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: syntavra-dependency-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: GitHub dependency diff review
        id: dependency-review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
          warn-only: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sdk/typescript/package-lock.json
      - name: Audit installer dependencies
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm audit --audit-level=high
      - name: Audit TypeScript SDK dependencies
        working-directory: sdk/typescript
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm audit --audit-level=high
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Audit Syntavra Python project dependencies
        run: |
          python -m pip install --disable-pip-version-check pip-audit
          pip-audit --strict .
      - name: Report native dependency-review availability
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.dependency-review.outcome }}" != "success" ]; then
            echo "GitHub dependency diff review was unavailable or returned a warning; ecosystem audits remained mandatory and completed separately." >> "$GITHUB_STEP_SUMMARY"
          fi
