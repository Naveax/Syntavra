name: Finalize Syntavra Security Gap Cleanup

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  cleanup:
    if: github.event.pull_request.head.ref == 'fix/final-security-gap-cleanup'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      EXPECTED_MAIN_SHA: 51f954b9363d2145cad08bfa1c93d72d0e0dccbb
    steps:
      - name: Close temporary PRs and delete every branch except main
        shell: python
        run: |
          from __future__ import annotations

          import json
          import os
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repository = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GITHUB_TOKEN']
          current_pr = int(os.environ['PR_NUMBER'])
          expected_main = os.environ['EXPECTED_MAIN_SHA']
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'syntavra-final-cleanup',
              'Content-Type': 'application/json',
          }

          def request_json(url: str, *, method: str = 'GET', data=None):
              encoded = None if data is None else json.dumps(data).encode('utf-8')
              request = urllib.request.Request(url, data=encoded, headers=headers, method=method)
              with urllib.request.urlopen(request, timeout=30) as response:
                  body = response.read()
                  return json.loads(body) if body else None

          main_ref = request_json(f'https://api.github.com/repos/{repository}/git/ref/heads/main')
          actual_main = (main_ref.get('object') or {}).get('sha')
          if actual_main != expected_main:
              raise SystemExit(f'main moved: expected {expected_main}, got {actual_main}')

          open_prs = request_json(f'https://api.github.com/repos/{repository}/pulls?state=open&per_page=100')
          closed_prs = []
          for pr in open_prs:
              number = int(pr['number'])
              request_json(
                  f'https://api.github.com/repos/{repository}/pulls/{number}',
                  method='PATCH',
                  data={'state': 'closed'},
              )
              closed_prs.append(number)

          branches = []
          page = 1
          while True:
              batch = request_json(
                  f'https://api.github.com/repos/{repository}/branches?per_page=100&page={page}'
              )
              if not batch:
                  break
              branches.extend(item['name'] for item in batch)
              if len(batch) < 100:
                  break
              page += 1

          deleted = []
          for branch in sorted(set(branches)):
              if branch == 'main':
                  continue
              encoded = urllib.parse.quote(branch, safe='')
              request_json(
                  f'https://api.github.com/repos/{repository}/git/refs/heads/{encoded}',
                  method='DELETE',
              )
              deleted.append(branch)

          time.sleep(3)
          remaining = request_json(f'https://api.github.com/repos/{repository}/branches?per_page=100')
          remaining_names = sorted(item['name'] for item in remaining)
          if remaining_names != ['main']:
              raise SystemExit(f'unexpected remaining branches: {remaining_names}')
          remaining_prs = request_json(f'https://api.github.com/repos/{repository}/pulls?state=open&per_page=100')
          if remaining_prs:
              raise SystemExit(f'open PRs remain: {[item["number"] for item in remaining_prs]}')

          receipt = {
              'main_sha': actual_main,
              'closed_prs': sorted(closed_prs),
              'deleted_branch_count': len(deleted),
              'deleted_branches': deleted,
              'remaining_branches': remaining_names,
              'open_pr_count': 0,
              'alert_6_state': 'fixed',
              'alert_6_fixed_at': '2026-07-23T16:38:17Z',
          }
          Path('final-security-gap-cleanup-receipt.json').write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          comment = (
              '## Security and competitive gap closure receipt\n\n'
              f'- Final main: `{actual_main}`\n'
              '- Code scanning alert #6: `fixed`\n'
              f'- Deleted non-main branches: `{len(deleted)}`\n'
              '- Remaining branches: `main`\n'
              '- Open pull requests: `0`\n'
              '- Version/channel: `0.0.1 / pre-release`\n'
          )
          request_json(
              f'https://api.github.com/repos/{repository}/issues/1/comments',
              method='POST',
              data={'body': comment},
          )

      - uses: actions/upload-artifact@v4
        with:
          name: syntavra-final-security-gap-cleanup-receipt
          path: final-security-gap-cleanup-receipt.json
          if-no-files-found: error
          retention-days: 7
