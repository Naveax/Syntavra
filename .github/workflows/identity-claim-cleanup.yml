name: Identity and claim cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup-and-validate:
    if: github.actor == github.repository_owner && github.head_ref == 'agent/syntavra-identity-claim-cleanup-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply canonical identity and claim policy
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/_identity_claim_cleanup.py')
          text = path.read_text(encoding='utf-8')
          old = '''        '"legacy-product-name": re.compile(r"\\\\bsignal[\\\\s_-]*core\\\\b", re.IGNORECASE),',\n        text,\n'''
          new = '''        lambda _: '"legacy-product-name": re.compile(r"\\\\bsignal[\\\\s_-]*core\\\\b", re.IGNORECASE),',\n        text,\n'''
          if old not in text:
              raise SystemExit('expected hygiene replacement block not found')
          path.write_text(text.replace(old, new), encoding='utf-8', newline='\n')
          PY
          python tools/_identity_claim_cleanup.py
          git mv tools/signalcore.py tools/syntavra.py
          python - <<'PY'
          from pathlib import Path
          replacements = {
              'Complete competitive feature set': 'Implemented feature inventory',
              'Technical gap closure is internally verified; external superiority remains unproven.':
                  'Tracked technical implementation checks are internally verified; external superiority remains unproven.',
          }
          suffixes = {'', '.json', '.md', '.mjs', '.py', '.rs', '.sh', '.toml', '.ts', '.txt', '.yaml', '.yml'}
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts or path.suffix.casefold() not in suffixes:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              updated = text
              for old, new in replacements.items():
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated, encoding='utf-8', newline='\n')
          PY
          git rm -f .github/workflows/identity-claim-cleanup.yml tools/_identity_claim_cleanup.py
      - name: Install Python validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[code-intelligence]' pytest build
      - name: Refresh deterministic repository manifest
        run: python -m tools.refresh_manifest
      - name: Validate canonical identity and claims
        run: python -m tools.validate_claim_integrity
      - name: Capture repository contract reports
        shell: bash
        run: |
          reports=/tmp/syntavra-validation-reports
          rm -rf "$reports"
          mkdir -p "$reports"
          capture() {
            local name="$1"
            shift
            set +e
            "$@" >"${reports}/${name}.json" 2>&1
            local status=$?
            set -e
            printf '%s\n' "$status" >"${reports}/${name}.exit"
          }
          capture repository python -m tools.validate
          capture runtime python -m tools.validate_runtime
          capture release python -m tools.validate_release
          capture competitive python -m tools.validate_competitive_gap_assessment
          capture hygiene python -m tools.check_repository_hygiene
          set +e
          python -m compileall -q syntavra_runtime tools benchmarks tests >"${reports}/compile.txt" 2>&1
          printf '%s\n' "$?" >"${reports}/compile.exit"
          git diff --check >"${reports}/diff.txt" 2>&1
          printf '%s\n' "$?" >"${reports}/diff.exit"
          set -e
      - uses: actions/upload-artifact@v4
        with:
          name: repository-contract-reports
          path: /tmp/syntavra-validation-reports
          if-no-files-found: error
      - name: Enforce repository contracts
        run: |
          python - <<'PY'
          from pathlib import Path
          root = Path('/tmp/syntavra-validation-reports')
          failed = [path.stem for path in sorted(root.glob('*.exit')) if path.read_text(encoding='utf-8').strip() != '0']
          if failed:
              raise SystemExit('failed contracts: ' + ', '.join(failed))
          PY
      - name: Run Python test suite
        run: python -m pytest -q
      - name: Validate npm installer
        run: |
          npm ci
          npm test
          npm run pack:check
      - name: Validate TypeScript SDK
        working-directory: sdk/typescript
        run: |
          npm ci
          npm run ci
      - name: Validate VS Code integration
        working-directory: integrations/vscode-syntavra
        run: npm test
      - name: Validate native companion
        working-directory: native/syntavra-native
        run: |
          cargo test --locked
          cargo build --locked --release
      - name: Build Python distribution
        run: python -m build
      - name: Commit validated canonical product tree
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name 'syntavra-validation-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Canonicalize Syntavra identity and evidence claims'
          git push origin "HEAD:${HEAD_BRANCH}"
