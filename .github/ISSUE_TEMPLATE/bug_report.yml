name: Bug report
description: Report a reproducible SignalCore runtime, installation or integration defect
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        SignalCore is 0.0.1 pre-release. Remove credentials, private source and private prompts before submitting.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python version, Node version and coding-agent host
      placeholder: Windows 11, Python 3.13, Node 22, Codex
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Exact commands and minimal steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized output
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed credentials, tokens, private keys and private repository content.
          required: true
